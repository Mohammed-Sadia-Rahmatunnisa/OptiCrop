<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCrop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<div class="container mt-5">

    <h1 class="text-center text-success">🌱 OptiCrop</h1>
    <h3 class="text-center mb-4">AI-Powered Crop Recommendation System</h3>

    <div class="row justify-content-center">
        <div class="col-md-6">

            <form action="/predict" method="POST">

                <div class="mb-3">
                    <label class="form-label">Nitrogen (N)</label>
                    <input type="number" class="form-control" name="nitrogen" placeholder="Enter Nitrogen" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phosphorous (P)</label>
                    <input type="number" class="form-control" name="phosphorus" placeholder="Enter Phosphorus" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Potassium (K)</label>
                    <input type="number" class="form-control" name="potassium" placeholder="Enter Potassium" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Temperature (°C)</label>
                    <input type="number" class="form-control" name="temperature" placeholder="Enter Temperature" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Humidity (%)</label>
                    <input type="number" class="form-control" name="humidity" placeholder="Enter Humidity" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">pH Value</label>
                    <input type="number" class="form-control" name="ph" placeholder="Enter pH" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Rainfall (mm)</label>
                    <input type="number" class="form-control" name="rainfall" placeholder="Enter Rainfall" required>
                </div>

                <div class="d-grid">
                    <button class="btn btn-success btn-lg">
                        Predict Crop
                    </button>
                </div>

                {% if prediction_text %}
                <div class="alert alert-success mt-4 text-center">
                  <h4>{{ prediction_text }}</h4>
                </div>
                {% endif %}

            </form>

        </div>
    </div>

</div>

</body>
</html>
